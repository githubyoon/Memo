<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memo Update</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #111;
      color: #fff;
    }
    a {
      color: #4da6ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Memo CLI</h1>
  <p>Update Server is Running</p>

  <p>
    Latest Version: <span id="ver">Loading...</span>
  </p>

  <p>
    <a href="https://github.com/githubyoon/Memo/releases/latest/download/memo.exe">
      Download Latest Version
    </a>
  </p>
  
  <p>
     <a href="https://github.com/githubyoon/Memo/releases/latest">
     Download Page
  </p>

  <script>
    fetch("version.txt")
      .then(res => res.text())
      .then(text => {
        document.getElementById("ver").innerText = text.trim();
      })
      .catch(() => {
        document.getElementById("ver").innerText = "Unknown";
      });
  </script>
</body>
</html>
